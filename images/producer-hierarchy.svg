<svg width="680" height="420" viewBox="0 0 680 420" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#505992" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- Executive Producer — purple -->
  <rect x="230" y="30" width="220" height="56" rx="8" fill="#35307a" stroke="#9088ee" stroke-width="0.8"/>
  <text font-family="'Source Sans 3', sans-serif" font-weight="700" font-size="14" fill="#CECBF6" x="340" y="51" text-anchor="middle" dominant-baseline="central">Executive Producer</text>
  <text font-family="'Source Sans 3', sans-serif" font-size="11" fill="#AFA9EC" x="340" y="69" text-anchor="middle" dominant-baseline="central">Financing and top-level oversight</text>

  <line x1="340" y1="86" x2="340" y2="118" stroke="#505992" stroke-width="1" marker-end="url(#arr)"/>

  <!-- Producer — yellow -->
  <rect x="230" y="118" width="220" height="56" rx="8" fill="#3a3410" stroke="#FDDC43" stroke-width="0.8"/>
  <text font-family="'Source Sans 3', sans-serif" font-weight="700" font-size="15" fill="#FDDC43" x="340" y="139" text-anchor="middle" dominant-baseline="central">Producer</text>
  <text font-family="'Source Sans 3', sans-serif" font-size="11" fill="#d4a820" x="340" y="157" text-anchor="middle" dominant-baseline="central">Runs the project end to end</text>

  <line x1="280" y1="174" x2="170" y2="224" stroke="#505992" stroke-width="1" marker-end="url(#arr)"/>
  <line x1="340" y1="174" x2="340" y2="318" stroke="#505992" stroke-width="1" marker-end="url(#arr)"/>
  <line x1="400" y1="174" x2="510" y2="224" stroke="#505992" stroke-width="1" marker-end="url(#arr)"/>

  <!-- Line Producer — blue -->
  <rect x="60" y="224" width="220" height="56" rx="8" fill="#0d2a4a" stroke="#378ADD" stroke-width="0.8"/>
  <text font-family="'Source Sans 3', sans-serif" font-weight="700" font-size="14" fill="#85B7EB" x="170" y="244" text-anchor="middle" dominant-baseline="central">Line Producer</text>
  <text font-family="'Source Sans 3', sans-serif" font-size="11" fill="#378ADD" x="170" y="262" text-anchor="middle" dominant-baseline="central">Budget, crew, logistics</text>

  <!-- Co-Producer — blue -->
  <rect x="400" y="224" width="220" height="56" rx="8" fill="#0d2a4a" stroke="#378ADD" stroke-width="0.8"/>
  <text font-family="'Source Sans 3', sans-serif" font-weight="700" font-size="14" fill="#85B7EB" x="510" y="244" text-anchor="middle" dominant-baseline="central">Co-Producer</text>
  <text font-family="'Source Sans 3', sans-serif" font-size="11" fill="#378ADD" x="510" y="262" text-anchor="middle" dominant-baseline="central">Owns a specific phase or deal</text>

  <!-- Associate Producer — indigo -->
  <rect x="230" y="318" width="220" height="56" rx="8" fill="#252a6e" stroke="#6870b8" stroke-width="0.8"/>
  <text font-family="'Source Sans 3', sans-serif" font-weight="700" font-size="14" fill="#9aa0d8" x="340" y="338" text-anchor="middle" dominant-baseline="central">Associate Producer</text>
  <text font-family="'Source Sans 3', sans-serif" font-size="11" fill="#6a70a8" x="340" y="356" text-anchor="middle" dominant-baseline="central">Supporting role, variable scope</text>
</svg>
